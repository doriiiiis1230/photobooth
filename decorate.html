<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>裝飾照片 - ギャルPURI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="decorate">
    <div class="phone-container">
        <h1 class="gal-title">DECORATE 💖</h1>
        <div class="content-area">
            <div class="sticker-menu">
                <img class="sticker-item" src="./images/sticker1.png" data-src="images/sticker1.png" alt="Sticker 1">
                <img class="sticker-item" src="./images/sticker2.png" data-src="images/sticker2.png" alt="Sticker 2">
                <img class="sticker-item" src="./images/sticker3.png" data-src="images/sticker3.png" alt="Sticker 3">
                <img class="sticker-item" src="./images/sticker4.png" data-src="images/sticker4.png" alt="Sticker 4">
            </div>
            
            <div class="photo-workspace" id="workspace">
                <img id="captured-img" src="" alt="Captured">
                <img id="frame-overlay-dec" src="" alt="Frame">
            </div>
        </div>
        <button class="gal-btn" id="finish-btn">OK! NEXT 👉</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
